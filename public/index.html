<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>엑셀 주소 분석</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .wrap {
      width: min(760px, calc(100% - 32px));
      margin: 64px auto;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .06);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    .desc {
      color: #5f6875;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .notice {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 24px;
      line-height: 1.6;
      font-size: 14px;
    }

    /* =====================================================
     * 결과 엑셀 노출 방식
     * =================================================== */

    .output-mode-box {
      margin-bottom: 20px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      text-align: left;
    }

    .output-mode-title {
      display: block;
      margin-bottom: 12px;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .output-mode-list {
      display: flex;
      gap: 10px;
    }

    .output-mode-item {
      position: relative;
      flex: 1;
      cursor: pointer;
    }

    .output-mode-item input {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .output-mode-content {
      display: block;
      min-height: 82px;
      padding: 15px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
      transition:
        border-color .2s ease,
        background-color .2s ease,
        box-shadow .2s ease;
    }

    .output-mode-name {
      display: block;
      margin-bottom: 5px;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .output-mode-desc {
      display: block;
      font-size: 12px;
      line-height: 1.5;
      color: #6b7280;
    }

    .output-mode-item input:checked +
    .output-mode-content {
      border-color: #111827;
      background: #f8fafc;
      box-shadow: 0 0 0 1px #111827;
    }

    .output-mode-item input:focus-visible +
    .output-mode-content {
      outline: 3px solid rgba(17, 24, 39, .18);
      outline-offset: 2px;
    }

    .output-column-notice {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
      font-size: 12px;
      line-height: 1.6;
      color: #6b7280;
    }

    .output-column-notice strong {
      color: #374151;
    }

    /* =====================================================
     * 파일 업로드
     * =================================================== */

    .upload-box {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      background: #fafafa;
    }

    input[type="file"] {
      width: 100%;
      margin-bottom: 18px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 16px;
      cursor: pointer;
      background: #111827;
      color: #fff;
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .progress-area {
      margin-top: 20px;
      text-align: left;
    }

    .progress-area[hidden] {
      display: none;
    }

    .progress-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 9px;
      font-size: 14px;
      color: #4b5563;
    }

    .progress-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .progress-percent {
      flex: 0 0 auto;
      color: #111827;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5e7eb;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        #111827,
        #4b5563
      );
      transition: width .35s ease;
    }

    .progress-area.is-success .progress-bar {
      background: linear-gradient(
        90deg,
        #047857,
        #34d399
      );
    }

    .progress-area.is-error .progress-bar {
      background: linear-gradient(
        90deg,
        #b91c1c,
        #ef4444
      );
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .success {
      color: #047857;
    }

    .error {
      color: #b91c1c;
    }

    @media (max-width: 600px) {
      .wrap {
        margin: 28px auto;
      }

      .card {
        padding: 22px;
      }

      .upload-box {
        padding: 22px 18px;
      }

      .output-mode-list {
        flex-direction: column;
      }

      .output-mode-content {
        min-height: auto;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card">
      <h1>엑셀 주소 분석</h1>

      <p class="desc">
        엑셀의 주소를 기준으로 기본주소를 먼저 확정한 뒤,
        남은 문자열에서 동·층·호 등 상세주소를 분리합니다.
      </p>

      <div class="notice">
        <strong>필수 헤더:</strong> 주소<br>
        <strong>선택 헤더:</strong> 우편번호, 주문번호<br>
        지원 파일: .xlsx, .xls / 첫 번째 시트를 처리합니다.
      </div>

      <form id="uploadForm">

        <!-- 결과 엑셀 노출 방식 -->
        <div class="output-mode-box">
          <strong class="output-mode-title">
            결과 엑셀 노출 방식
          </strong>

          <div class="output-mode-list">

            <!-- 전체노출 -->
            <label class="output-mode-item">
              <input
                type="radio"
                name="outputMode"
                value="all"
              >

              <span class="output-mode-content">
                <span class="output-mode-name">
                  전체노출
                </span>

                <span class="output-mode-desc">
                  주소 분석 및 건축물대장 관련
                  전체 결과 항목을 출력합니다.
                </span>
              </span>
            </label>

            <!-- 일부노출: 기본 선택 -->
            <label class="output-mode-item">
              <input
                type="radio"
                name="outputMode"
                value="partial"
                checked
              >

              <span class="output-mode-content">
                <span class="output-mode-name">
                  일부노출
                </span>

                <span class="output-mode-desc">
                  확인에 필요한 주요 결과 항목만
                  간략하게 출력합니다.
                </span>
              </span>
            </label>
          </div>

          <div class="output-column-notice">
            <strong>일부노출 항목:</strong><br>
            순번, 주문번호, 입력우편번호, 입력주소,
            주소처리성공, 전체층수, 지상층수, 지하층수,
            건축물대장조회, 동호검증사유, 상세주소상태,
            주소분석실패사유
          </div>
        </div>

        <div class="upload-box">
          <input
            id="excelFile"
            name="file"
            type="file"
            accept=".xlsx,.xls"
            required
          >

          <button
            id="submitButton"
            type="submit"
          >
            주소 분석 후 결과 엑셀 받기
          </button>

          <div
            id="progressArea"
            class="progress-area"
            hidden
          >
            <div class="progress-info">
              <span
                id="progressText"
                class="progress-text"
              >
                파일 업로드 준비 중...
              </span>

              <strong
                id="progressCount"
                class="progress-percent"
              >
                0/0개 · 0%
              </strong>
            </div>

            <div class="progress-track">
              <div
                id="progressBar"
                class="progress-bar"
              ></div>
            </div>
          </div>

          <div
            id="status"
            class="status"
          ></div>
        </div>
      </form>
    </section>
  </main>

  <script>
  (function () {
    "use strict";

    const form =
      document.getElementById(
        "uploadForm"
      );

    const fileInput =
      document.getElementById(
        "excelFile"
      );

    const button =
      document.getElementById(
        "submitButton"
      );

    const statusBox =
      document.getElementById(
        "status"
      );

    const progressArea =
      document.getElementById(
        "progressArea"
      );

    const progressText =
      document.getElementById(
        "progressText"
      );

    const progressCount =
      document.getElementById(
        "progressCount"
      );

    const progressBar =
      document.getElementById(
        "progressBar"
      );

    const outputModeInputs =
      document.querySelectorAll(
        'input[name="outputMode"]'
      );

    let pollingStopped =
      false;

    /* =====================================================
     * 공통 표시
     * =================================================== */

    function setProgress(
      current,
      total,
      percent,
      message
    ) {
      const safeCurrent =
        Math.max(
          0,
          Number(current) || 0
        );

      const safeTotal =
        Math.max(
          0,
          Number(total) || 0
        );

      const safePercent =
        Math.max(
          0,
          Math.min(
            100,
            Number(percent) || 0
          )
        );

      progressArea.hidden =
        false;

      progressBar.style.width =
        `${safePercent}%`;

      progressCount.textContent =
        `${safeCurrent}/${safeTotal}개 · ${Math.round(safePercent)}%`;

      if (message) {
        progressText.textContent =
          message;
      }
    }

    function resetProgress() {
      pollingStopped =
        false;

      progressArea.hidden =
        false;

      progressArea.classList.remove(
        "is-success",
        "is-error"
      );

      progressBar.style.width =
        "0%";

      progressCount.textContent =
        "0/0개 · 0%";

      progressText.textContent =
        "파일 업로드 준비 중...";

      statusBox.className =
        "status";

      statusBox.textContent =
        "";
    }

    function wait(milliseconds) {
      return new Promise(
        function (resolve) {
          setTimeout(
            resolve,
            milliseconds
          );
        }
      );
    }

    function validateExcelFile(file) {
      const allowedExtensions = [
        ".xlsx",
        ".xls"
      ];

      const lowerFileName =
        file.name.toLowerCase();

      return allowedExtensions.some(
        function (extension) {
          return lowerFileName.endsWith(
            extension
          );
        }
      );
    }

    /*
     * 선택된 결과 노출 방식을 가져옵니다.
     *
     * 선택값을 찾지 못할 경우에도
     * 일부노출을 기본값으로 사용합니다.
     */
    function getSelectedOutputMode() {
      const selectedInput =
        document.querySelector(
          'input[name="outputMode"]:checked'
        );

      if (!selectedInput) {
        return "partial";
      }

      return selectedInput.value === "all"
        ? "all"
        : "partial";
    }

    function setFormDisabled(disabled) {
      button.disabled =
        disabled;

      fileInput.disabled =
        disabled;

      outputModeInputs.forEach(
        function (input) {
          input.disabled =
            disabled;
        }
      );
    }

    /* =====================================================
     * 오류 응답 읽기
     * =================================================== */

    async function readResponseData(
      response
    ) {
      const contentType =
        response.headers.get(
          "content-type"
        ) || "";

      if (
        contentType.includes(
          "application/json"
        )
      ) {
        return response.json();
      }

      const text =
        await response.text();

      return {
        ok:
          response.ok,

        reason:
          text
      };
    }

    /* =====================================================
     * 결과 파일 다운로드
     * =================================================== */

    function downloadResult(
      downloadUrl
    ) {
      /*
       * window.location 방식은 서버의
       * Content-Disposition 파일명을 그대로 사용합니다.
       */
      window.location.href =
        downloadUrl;
    }

    /* =====================================================
     * 진행률 반복 조회
     * =================================================== */

    async function pollProgress(
      progressUrl,
      downloadUrl
    ) {
      while (
        !pollingStopped
      ) {
        const response =
          await fetch(
            progressUrl,
            {
              method:
                "GET",

              cache:
                "no-store",

              headers: {
                "Accept":
                  "application/json"
              }
            }
          );

        const data =
          await readResponseData(
            response
          );

        if (
          !response.ok ||
          !data.ok
        ) {
          throw new Error(
            data.reason ||
            data.message ||
            "진행률 조회에 실패했습니다."
          );
        }

        const current =
          Number(
            data.current ||
            0
          );

        const total =
          Number(
            data.total ||
            0
          );

        const percent =
          Number(
            data.percent ||
            0
          );

        let message =
          data.message ||
          "주소를 분석하고 있습니다.";

        if (
          data.status ===
          "WAITING"
        ) {
          message =
            "작업을 준비하고 있습니다.";
        } else if (
          data.status ===
          "READING"
        ) {
          message =
            "엑셀 파일을 읽고 있습니다.";
        } else if (
          data.status ===
          "PROCESSING"
        ) {
          if (
            data.currentAddress
          ) {
            message =
              `${current}/${total}개 처리 중 · ${data.currentAddress}`;
          } else {
            message =
              `${current}/${total}개 처리 중`;
          }
        } else if (
          data.status ===
          "CREATING_FILE"
        ) {
          message =
            "주소 분석이 끝났습니다. 결과 엑셀을 생성하고 있습니다.";
        }

        setProgress(
          current,
          total,
          percent,
          message
        );

        if (
          data.status ===
          "ERROR"
        ) {
          throw new Error(
            data.error ||
            data.message ||
            "주소 분석 중 오류가 발생했습니다."
          );
        }

        if (
          data.status ===
          "COMPLETED"
        ) {
          pollingStopped =
            true;

          progressArea.classList.add(
            "is-success"
          );

          setProgress(
            total,
            total,
            100,
            "주소 분석이 완료되었습니다."
          );

          statusBox.className =
            "status success";

          statusBox.textContent =
            "분석이 완료되어 결과 엑셀을 내려받습니다.";

          const finalDownloadUrl =
            data.downloadUrl ||
            downloadUrl;

          downloadResult(
            finalDownloadUrl
          );

          return;
        }

        await wait(
          700
        );
      }
    }

    /* =====================================================
     * 업로드 실행
     * =================================================== */

    form.addEventListener(
      "submit",

      async function (event) {
        event.preventDefault();

        const file =
          fileInput.files[0];

        if (!file) {
          statusBox.className =
            "status error";

          statusBox.textContent =
            "엑셀 파일을 선택해 주세요.";

          return;
        }

        if (
          !validateExcelFile(
            file
          )
        ) {
          statusBox.className =
            "status error";

          statusBox.textContent =
            "엑셀 파일(.xlsx, .xls)만 선택할 수 있습니다.";

          return;
        }

        /*
         * 기본 선택값은 partial입니다.
         */
        const outputMode =
          getSelectedOutputMode();

        const formData =
          new FormData();

        formData.append(
          "file",
          file
        );

        /*
         * 서버의 detail-address-extractor.js로
         * all 또는 partial 값을 전달합니다.
         */
        formData.append(
          "outputMode",
          outputMode
        );

        setFormDisabled(
          true
        );

        resetProgress();

        const outputModeText =
          outputMode === "all"
            ? "전체노출"
            : "일부노출";

        setProgress(
          0,
          0,
          0,
          `엑셀 파일을 업로드하고 있습니다. · ${outputModeText}`
        );

        try {
          const response =
            await fetch(
              "/api/excel/start",
              {
                method:
                  "POST",

                body:
                  formData,

                headers: {
                  "Accept":
                    "application/json"
                }
              }
            );

          const data =
            await readResponseData(
              response
            );

          if (
            !response.ok ||
            !data.ok
          ) {
            throw new Error(
              data.reason ||
              data.message ||
              "엑셀 작업 시작에 실패했습니다."
            );
          }

          if (!data.jobId) {
            throw new Error(
              "서버에서 작업 ID를 받지 못했습니다."
            );
          }

          const progressUrl =
            data.progressUrl ||
            `/api/excel/progress/${data.jobId}`;

          const downloadUrl =
            data.downloadUrl ||
            `/api/excel/download/${data.jobId}`;

          setProgress(
            data.current || 0,
            data.total || 0,
            data.percent || 0,
            `주소 분석 작업을 준비하고 있습니다. · ${outputModeText}`
          );

          await pollProgress(
            progressUrl,
            downloadUrl
          );
        } catch (error) {
          pollingStopped =
            true;

          progressArea.classList.add(
            "is-error"
          );

          progressText.textContent =
            "주소 분석에 실패했습니다.";

          statusBox.className =
            "status error";

          statusBox.textContent =
            error instanceof Error
              ? error.message
              : "주소 분석에 실패했습니다.";
        } finally {
          setFormDisabled(
            false
          );
        }
      }
    );
  })();
  </script>
</body>
</html>
