<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>엑셀 주소 분석</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f4f6f8;
      color: #222;
    }
    .wrap {
      width: min(760px, calc(100% - 32px));
      margin: 64px auto;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
    }
    h1 { margin: 0 0 12px; font-size: 28px; }
    .desc { color: #5f6875; line-height: 1.65; margin-bottom: 28px; }
    .notice {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 24px;
      line-height: 1.6;
      font-size: 14px;
    }
    .upload-box {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      background: #fafafa;
    }
    input[type=file] {
      width: 100%;
      margin-bottom: 18px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 16px;
      cursor: pointer;
      background: #111827;
      color: #fff;
      width: 100%;
    }
    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 18px;
      min-height: 24px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .success { color: #047857; }
    .error { color: #b91c1c; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>엑셀 주소 분석</h1>
      <p class="desc">
        엑셀의 주소를 기준으로 기본주소를 먼저 확정한 뒤,
        남은 문자열에서 동·층·호 등 상세주소를 분리합니다.
      </p>

      <div class="notice">
        <strong>필수 헤더:</strong> 주소<br>
        <strong>선택 헤더:</strong> 우편번호<br>
        지원 파일: .xlsx, .xls / 첫 번째 시트를 처리합니다.
      </div>

      <form id="uploadForm">
        <div class="upload-box">
          <input
            id="excelFile"
            name="file"
            type="file"
            accept=".xlsx,.xls"
            required
          >
          <button id="submitButton" type="submit">
            주소 분석 후 결과 엑셀 받기
          </button>
          <div id="status" class="status"></div>
        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("uploadForm");
    const fileInput = document.getElementById("excelFile");
    const button = document.getElementById("submitButton");
    const statusBox = document.getElementById("status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const file = fileInput.files[0];
      if (!file) {
        statusBox.className = "status error";
        statusBox.textContent = "엑셀 파일을 선택해 주세요.";
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      button.disabled = true;
      statusBox.className = "status";
      statusBox.textContent =
        "주소를 분석하고 있습니다.\n행 수에 따라 처리 시간이 달라질 수 있습니다.";

      try {
        const response = await fetch("/api/excel/analyze", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          const contentType = response.headers.get("content-type") || "";
          let message = "처리에 실패했습니다.";

          if (contentType.includes("application/json")) {
            const errorData = await response.json();
            message = errorData.reason || message;
          } else {
            message = await response.text();
          }

          throw new Error(message);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.href = url;
        link.download = "주소분석결과.xlsx";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);

        statusBox.className = "status success";
        statusBox.textContent = "분석이 완료되어 결과 엑셀을 내려받았습니다.";
      } catch (error) {
        statusBox.className = "status error";
        statusBox.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
